<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — World Financial Bank</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="register">

  <div class="auth-bg">
    <div class="auth-card anim-fadeup">

      <div class="auth-logo">
        <img src="images/logo.svg" alt="World Financial Bank"/>
      </div>

      <h1 class="auth-title">Open Your Account</h1>
      <p class="auth-subtitle">Free to open · $10,000 starting balance · No paperwork</p>

      <div id="reg-alert" class="alert alert-error"></div>

      <form id="reg-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input id="reg-name" type="text" class="form-control"
                 placeholder="John Doe" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input id="reg-email" type="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Password</label>
          <input id="reg-pass" type="password" class="form-control"
                 placeholder="Min. 6 characters" required autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input id="reg-confirm" type="password" class="form-control"
                 placeholder="Repeat your password" required autocomplete="new-password"/>
        </div>

        <div style="font-size:var(--fs-xs);color:rgba(255,255,255,.45);margin-bottom:var(--sp-5);line-height:1.7;">
          By creating an account you agree to our <a href="#" style="color:var(--c-gold);">Terms of Service</a>
          and <a href="#" style="color:var(--c-gold);">Privacy Policy</a>.
        </div>

        <button id="reg-btn" type="submit" class="btn btn-gold btn-block btn-lg">
          Create My Account
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in →</a>
      </div>
    </div>
  </div>

  <!-- Smartsupp Live Chat — add script here -->

  <script src="js/app.js"></script>
</body>
</html>
