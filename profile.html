<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — World Financial Bank</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="profile" class="app-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-inner">
        <a href="dashboard.html" class="nav-logo">
          <img src="images/logo.svg" alt="WFB"/>
        </a>
        <div class="nav-menu" id="nav-menu">
          <a href="dashboard.html"    class="nav-link">Dashboard</a>
          <a href="transactions.html" class="nav-link">Transactions</a>
          <a href="profile.html"      class="nav-link active">Profile</a>
        </div>
        <div class="nav-right">
          <div class="nav-avatar" id="nav-initials">?</div>
          <span class="nav-username" id="nav-username"></span>
          <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="page-main">

    <!-- Profile Hero Card -->
    <div class="profile-hero anim-fadeup">
      <div class="profile-avatar" id="prof-initials">?</div>
      <div class="profile-hero-name"  id="prof-name">Loading…</div>
      <div class="profile-hero-email" id="prof-email"></div>
      <div class="profile-hero-date">Member since: <span id="prof-joined"></span></div>
    </div>

    <!-- Account Info Grid -->
    <div class="info-grid anim-fadeup delay-1">
      <div class="info-card">
        <div class="info-lbl">Current Balance</div>
        <div class="info-val text-gold" id="prof-balance">—</div>
      </div>
      <div class="info-card">
        <div class="info-lbl">Account Number</div>
        <div class="info-val" id="prof-account">—</div>
      </div>
      <div class="info-card" style="grid-column:1/-1;">
        <div class="info-lbl">IBAN</div>
        <div class="info-val" id="prof-iban" style="font-size:0.82rem;">—</div>
      </div>
    </div>

    <!-- Edit Profile -->
    <div class="edit-card anim-fadeup delay-2">
      <div class="edit-card-title">✏️ Edit Profile</div>

      <div id="prof-alert" class="alert alert-error"></div>

      <form id="edit-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="edit-name">Full Name</label>
          <input id="edit-name" type="text" class="form-control" placeholder="Your full name" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-email">Email Address</label>
          <input id="edit-email" type="email" class="form-control" placeholder="you@example.com" required/>
        </div>
        <div style="display:flex;gap:var(--sp-3);flex-wrap:wrap;">
          <button type="submit" class="btn btn-gold btn-lg">Save Changes</button>
          <a href="dashboard.html" class="btn btn-ghost btn-lg">← Dashboard</a>
        </div>
      </form>
    </div>

  </main>

  <!-- Smartsupp Live Chat — add script here -->

  <script src="js/app.js"></script>
</body>
</html>
