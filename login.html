<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — World Financial Bank</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body data-page="login">

  <div class="auth-bg">
    <div class="auth-card anim-fadeup">

      <div class="auth-logo">
        <img src="images/logo.svg" alt="World Financial Bank"/>
      </div>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to access your account</p>

      <div id="login-alert" class="alert alert-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input id="login-email" type="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" class="form-control"
                 placeholder="Your password" required autocomplete="current-password"/>
        </div>
        <button id="login-btn" type="submit" class="btn btn-gold btn-block btn-lg" style="margin-top:var(--sp-2);">
          Login to Account
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free →</a>
      </div>
      <div class="auth-footer" style="margin-top:var(--sp-2);">
        <a href="admin.html" style="color:rgba(255,255,255,.35);font-size:var(--fs-xs);">Admin Login</a>
      </div>
    </div>
  </div>

  <!-- Smartsupp Live Chat — add script here -->

  <script src="js/app.js"></script>
</body>
</html>
