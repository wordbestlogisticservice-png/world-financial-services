<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — World Financial Bank</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .admin-login-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      background: rgba(240,68,56,.12);
      border: 1px solid rgba(240,68,56,.3);
      border-radius: var(--r-full);
      padding: var(--sp-2) var(--sp-4);
      font-size: var(--fs-xs);
      color: #fca5a5;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: var(--sp-5);
    }
  </style>
</head>
<body data-page="admin-login">

  <div class="auth-bg" style="background-image:linear-gradient(150deg,rgba(6,15,34,.97) 0%,rgba(10,31,68,.94) 100%),url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1920&q=80');">
    <div class="auth-card anim-fadeup">

      <div class="auth-logo">
        <img src="images/logo.svg" alt="World Financial Bank"/>
      </div>

      <div style="text-align:center;">
        <div class="admin-login-badge">🔐 Admin Portal</div>
      </div>

      <h1 class="auth-title">Admin Access</h1>
      <p class="auth-subtitle">Authorised personnel only</p>

      <div id="adm-alert" class="alert alert-error"></div>

      <form id="adm-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="adm-username">Username</label>
          <input id="adm-username" type="text" class="form-control"
                 placeholder="Admin username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="adm-password">Password</label>
          <input id="adm-password" type="password" class="form-control"
                 placeholder="Admin password" required autocomplete="current-password"/>
        </div>

        <!-- Demo hint -->
        <div style="font-size:var(--fs-xs);color:rgba(255,255,255,.35);margin-bottom:var(--sp-5);text-align:center;">
          Demo — username: <code style="color:var(--c-gold);">admin</code> &nbsp;|&nbsp; password: <code style="color:var(--c-gold);">admin123</code>
        </div>

        <button id="adm-btn" type="submit" class="btn btn-gold btn-block btn-lg">
          Admin Login
        </button>
      </form>

      <div class="divider"></div>
      <div class="auth-footer">
        <a href="index.html" style="color:rgba(255,255,255,.4);font-size:var(--fs-xs);">← Back to main site</a>
      </div>
    </div>
  </div>

  <!-- Smartsupp Live Chat — add script here -->

  <script src="js/app.js"></script>
</body>
</html>
